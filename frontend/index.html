<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlockProof — Blockchain platform for data verification</title>
    <style>
      /* ---------- Binance-inspired dark palette ---------- */
      :root {
        --color-bg: #181A20;
        --color-bg-soft: #1E2329;
        --color-surface: #1E2329;
        --color-surface-elevated: #2B3139;
        --color-primary: #FCD535;
        --color-primary-soft: rgba(252, 213, 53, 0.15);
        --color-primary-light: #F0B90B;
        --color-accent: #FCD535;
        --color-accent-soft: rgba(252, 213, 53, 0.12);
        --color-text: #EAECEF;
        --color-muted: #B7BDC6;
        --color-border: #2B3139;
        --color-border-subtle: #2B3139;
        --color-success: #0ECB81;
        --color-danger: #F6465D;
        --color-warning: #F0B90B;
        --radius-lg: 12px;
        --radius-md: 10px;
        --radius-sm: 8px;
        --shadow-soft: 0 4px 24px rgba(0, 0, 0, 0.3);
        --shadow-card: 0 2px 16px rgba(0, 0, 0, 0.25);
        --spacing-xs: 4px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-xl: 32px;
        --clinic-white: var(--color-surface);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--color-bg);
        color: var(--color-text);
        -webkit-font-smoothing: antialiased;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      /* ---------- application shell ---------- */
      .app-shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .app-header {
        position: sticky;
        top: 0;
        z-index: 20;
        background: var(--color-surface);
        border-bottom: 1px solid var(--color-border);
        box-shadow: 0 1px 12px rgba(0, 0, 0, 0.25);
      }

      .app-header-inner {
        max-width: 1200px;
        margin: 0 auto;
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        color: var(--color-text);
      }

      .app-brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .app-brand-mark {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: linear-gradient(135deg, #FCD535, #F0B90B);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #181A20;
        font-size: 14px;
        font-weight: 700;
        box-shadow: 0 4px 12px rgba(252, 213, 53, 0.35);
      }

      .app-brand-text {
        display: flex;
        flex-direction: column;
      }

      .app-brand-title {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: var(--color-primary);
      }

      .app-brand-subtitle {
        font-size: 11px;
        color: var(--color-muted);
      }

      .app-nav {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .app-nav-link {
        padding: 8px 14px;
        border-radius: var(--radius-md);
        font-size: 13px;
        color: var(--color-muted);
        border: 1px solid transparent;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
      }

      .app-nav-link:hover {
        background: var(--color-primary-soft);
        color: var(--color-primary);
      }

      .app-nav-link--active {
        background: var(--color-primary-soft);
        color: var(--color-primary);
        font-weight: 600;
        border-color: rgba(252, 213, 53, 0.3);
      }

      .app-user {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
      }

      .app-user-pill {
        padding: 6px 12px;
        border-radius: var(--radius-md);
        background: var(--color-surface-elevated);
        border: 1px solid var(--color-border);
        font-size: 12px;
        color: var(--color-muted);
      }

      .app-main {
        flex: 1;
        display: flex;
        justify-content: center;
        padding: 24px 16px 32px;
      }

      .page-container {
        width: 100%;
        max-width: 1120px;
        min-width: 0;
        display: flex;
        gap: 20px;
      }

      .page-main {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .page-sidebar {
        width: 260px;
        min-width: 200px;
        flex-shrink: 0;
        display: none;
      }

      @media (min-width: 1080px) {
        .page-sidebar {
          display: block;
        }
      }

      .page-sidebar-card {
        background: var(--color-surface-elevated);
        color: var(--color-text);
        padding: 18px 18px 16px;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-card);
        border: 1px solid var(--color-border);
      }

      .page-sidebar-card h3 {
        margin: 0 0 6px;
        font-size: 15px;
      }

      .page-sidebar-card p {
        margin: 0;
        font-size: 12px;
        opacity: 0.95;
      }

      .page-sidebar-list {
        margin-top: 10px;
        padding: 0;
        list-style: none;
        font-size: 12px;
      }

      .page-sidebar-list li {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 4px;
        opacity: 0.95;
      }

      .page-sidebar-dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--color-primary);
      }

      .page {
        display: flex;
        flex-direction: column;
        gap: 16px;
        min-width: 0;
      }

      .container {
        max-width: 1120px;
        margin: 0 auto;
        padding: 0 8px;
      }

      .card {
        background: var(--color-surface);
        border-radius: var(--radius-lg);
        padding: 20px 20px 18px;
        box-shadow: var(--shadow-card);
        border: 1px solid var(--color-border);
        min-width: 0;
      }

      .card-soft {
        background: var(--color-surface-elevated);
        border: 1px solid var(--color-border);
      }

      .grid {
        display: grid;
        gap: 16px;
      }

      .grid > * {
        min-width: 0;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }

      .btn {
        border: 0;
        border-radius: 999px;
        padding: 9px 16px;
        cursor: pointer;
        font-weight: 500;
        font-size: 13px;
        transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease,
          transform 0.06s ease;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .btn-primary {
        background: linear-gradient(135deg, #FCD535, #F0B90B);
        color: #181A20;
        box-shadow: 0 4px 16px rgba(252, 213, 53, 0.25);
      }

      .btn-primary:hover {
        background: linear-gradient(135deg, #F0B90B, #D4A506);
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(252, 213, 53, 0.35);
      }

      .btn-danger {
        background: var(--color-danger);
        color: white;
      }

      .btn-muted {
        background: var(--color-surface-elevated);
        color: var(--color-text);
        border: 1px solid var(--color-border);
      }

      .btn-outline {
        background: transparent;
        border-radius: var(--radius-md);
        border: 1px solid var(--color-primary);
        color: var(--color-primary);
        padding-inline: 14px;
      }

      .btn-outline:hover {
        border-color: var(--color-primary);
        background: var(--color-primary-soft);
        color: var(--color-primary);
      }

      .btn-sm {
        padding: 6px 10px;
        font-size: 12px;
      }

      .input,
      select {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        font-size: 14px;
        background: var(--color-bg);
        color: var(--color-text);
        transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
      }

      .input:focus,
      select:focus {
        outline: none;
        border-color: var(--color-primary);
        box-shadow: 0 0 0 2px rgba(252, 213, 53, 0.2);
        background: var(--color-bg);
      }

      textarea.input {
        min-height: 90px;
        resize: vertical;
      }

      .label {
        font-size: 12px;
        color: var(--color-muted);
        margin-bottom: 6px;
        font-weight: 500;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .muted {
        color: var(--color-muted);
        font-size: 13px;
      }

      .ok {
        color: var(--color-success);
        font-weight: 600;
      }

      .bad {
        color: var(--color-danger);
        font-weight: 600;
      }

      .table-scroll {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        margin: 0;
      }

      table {
        width: 100%;
        min-width: 420px;
        border-collapse: collapse;
      }

      th,
      td {
        text-align: left;
        border-bottom: 1px solid var(--color-border);
        padding: 10px 8px;
        font-size: 13px;
        vertical-align: middle;
      }

      td code,
      td .hash-cell {
        max-width: 100%;
        display: inline-block;
        overflow: hidden;
        text-overflow: ellipsis;
        vertical-align: middle;
        word-break: break-all;
      }

      th {
        font-weight: 600;
        color: var(--color-muted);
        background: var(--color-bg-soft);
      }

      tbody tr:hover {
        background: var(--color-primary-soft);
      }

      code {
        background: var(--color-bg-soft);
        padding: 2px 6px;
        border-radius: 6px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New",
          monospace;
        font-size: 12px;
        word-break: break-all;
        overflow-wrap: break-word;
        max-width: 100%;
      }

      .w-full {
        width: 100%;
      }

      .text-center {
        text-align: center;
      }

      .mb-16 {
        margin-bottom: 16px;
      }

      .mt-16 {
        margin-top: 16px;
      }

      .footer {
        text-align: center;
        font-size: 13px;
        padding: 24px 20px;
        color: var(--color-muted);
        border-top: 1px solid var(--color-border);
        background: var(--color-surface);
        margin-top: auto;
      }

      .footer-inner {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
      }

      .footer-brand {
        font-weight: 600;
        color: var(--color-primary);
        font-size: 14px;
      }

      .footer-project {
        font-size: 12px;
        color: var(--color-muted);
      }

      .footer span {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 3px 9px;
        border-radius: 999px;
        font-size: 11px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        border: 1px solid var(--color-border);
        background: var(--color-bg-soft);
      }

      .badge-pill {
        border-radius: 999px;
      }

      .badge-soft-green {
        background: rgba(14, 203, 129, 0.18);
        border-color: rgba(14, 203, 129, 0.5);
        color: #0ECB81;
      }

      .badge-soft-blue {
        background: var(--color-primary-soft);
        border-color: rgba(252, 213, 53, 0.4);
        color: var(--color-primary);
      }

      .badge-soft-amber {
        background: rgba(240, 185, 11, 0.18);
        border-color: rgba(240, 185, 11, 0.5);
        color: #F0B90B;
      }

      .badge-soft-red {
        background: rgba(246, 70, 93, 0.18);
        border-color: rgba(246, 70, 93, 0.5);
        color: #F6465D;
      }

      .badge-accent {
        background: var(--color-primary-soft);
        border-color: rgba(252, 213, 53, 0.4);
        color: var(--color-primary);
      }

      .dashboard-page {
        gap: 24px;
      }

      .dashboard-hero {
        display: block;
      }

      .dashboard-hero-main {
        position: relative;
        overflow: hidden;
      }

      .dashboard-hero-main::before {
        content: "";
        position: absolute;
        inset: -40px;
        background:
          radial-gradient(circle at top left, rgba(252, 213, 53, 0.06), transparent 55%),
          radial-gradient(circle at bottom right, rgba(240, 185, 11, 0.08), transparent 55%);
        opacity: 0.9;
        pointer-events: none;
      }

      .dashboard-hero-main-inner {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .dashboard-hero-kpi {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 10px;
      }

      .dashboard-hero-secondary {
        display: grid;
        gap: 8px;
        align-content: flex-start;
      }

      .dashboard-hero-title {
        margin: 4px 0 2px;
        font-size: 26px;
        font-weight: 650;
        color: var(--color-text);
      }

      .dashboard-hero-desc {
        color: var(--color-muted);
        font-size: 14px;
        margin: 0;
      }

      .dashboard-hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 16px;
      }

      .dashboard-stats-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 16px;
      }

      @media (max-width: 768px) {
        .dashboard-stats-grid { grid-template-columns: repeat(2, 1fr); }
      }

      .dashboard-wallet-card {
        padding: 16px 20px;
      }

      .dashboard-wallet-inner {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }

      .wallet-address {
        font-size: 13px;
        word-break: break-all;
      }

      .dashboard-main-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
        gap: 20px;
      }

      @media (max-width: 900px) {
        .dashboard-main-grid { grid-template-columns: 1fr; }
        .dashboard-hero { grid-template-columns: 1fr; }
      }

      .dashboard-section {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }

      .section-title {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        color: var(--color-text);
      }

      .section-loading {
        display: flex;
        justify-content: center;
        padding: 24px 0;
      }

      .section-empty {
        padding: 20px 0;
        text-align: center;
      }

      .activity-list {
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .activity-list-item {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid var(--color-border);
      }

      .activity-list-item:last-child {
        border-bottom: none;
      }

      .activity-list-icon {
        font-size: 16px;
        flex-shrink: 0;
        line-height: 1.4;
      }

      .activity-list-content {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .activity-list-type {
        font-size: 12px;
        color: var(--color-muted);
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      .activity-list-doc {
        font-size: 13px;
        font-weight: 500;
        color: var(--color-primary);
      }

      .activity-list-doc:hover {
        text-decoration: underline;
      }

      .activity-list-time {
        font-size: 11px;
        color: var(--color-muted);
      }

      .activity-list-empty {
        padding: 24px;
        text-align: center;
        color: var(--color-muted);
        font-size: 13px;
      }

      .verify-layout {
        display: grid;
        grid-template-columns: minmax(0, 3fr) minmax(0, 2.2fr);
        gap: 20px;
      }

      @media (max-width: 900px) {
        .verify-layout {
          grid-template-columns: minmax(0, 1fr);
        }
      }

      .verify-result-grid {
        display: grid;
        gap: 12px;
      }

      .verify-hashes {
        display: grid;
        gap: 8px;
      }

      .timeline-grid {
        display: grid;
        gap: 10px;
      }

      .auth-shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: var(--color-bg);
      }

      .auth-main {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 32px 16px 24px;
      }

      .auth-card {
        width: 100%;
        max-width: 520px;
        background: var(--color-surface);
        border-radius: var(--radius-lg);
        padding: 24px 24px 20px;
        box-shadow: var(--shadow-soft);
        border: 1px solid var(--color-border);
      }

      .auth-header-title {
        font-size: 24px;
        font-weight: 650;
        margin: 0 0 4px;
      }

      .auth-header-subtitle {
        font-size: 13px;
        color: var(--color-muted);
      }

      .auth-footer {
        text-align: center;
        font-size: 13px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        align-items: center;
      }

      .auth-footer .footer-brand {
        font-weight: 600;
        color: var(--color-primary);
      }

      .auth-footer .footer-project {
        font-size: 12px;
        color: var(--color-muted);
      }

      .services-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
      }

      .service-card {
        background: var(--color-surface);
        border-radius: var(--radius-lg);
        padding: 20px;
        border: 1px solid var(--color-border);
        box-shadow: var(--shadow-card);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .service-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
      }

      .service-card-icon {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        background: var(--color-primary-soft);
        color: var(--color-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 12px;
      }

      .service-card-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--color-text);
        margin: 0 0 4px;
      }

      .service-card-desc {
        font-size: 12px;
        color: var(--color-muted);
        margin: 0;
      }

      .metric-card {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        background: var(--color-surface);
        border-radius: var(--radius-md);
        border: 1px solid var(--color-border);
        transition: box-shadow 0.2s ease;
      }

      .metric-card:hover {
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
      }

      .metric-card-icon {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: var(--color-primary-soft);
        color: var(--color-primary);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .metric-card-label {
        font-size: 11px;
        color: var(--color-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .metric-card-value {
        font-size: 22px;
        font-weight: 600;
        margin-top: 2px;
      }

      .activity-list {
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .activity-list-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--color-border);
        transition: background 0.15s ease;
      }

      .activity-list-item:last-child {
        border-bottom: none;
      }

      .activity-list-item:hover {
        background: var(--color-surface-elevated);
      }

      .activity-list-icon {
        width: 32px;
        height: 32px;
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        flex-shrink: 0;
      }

      .activity-list-icon--register { background: rgba(14, 203, 129, 0.15); color: var(--color-success); }
      .activity-list-icon--transfer { background: rgba(252, 213, 53, 0.15); color: var(--color-primary); }
      .activity-list-icon--verify { background: rgba(52, 168, 255, 0.15); color: #34a8ff; }
      .activity-list-icon--default { background: var(--color-surface-elevated); color: var(--color-muted); }

      .activity-list-body {
        flex: 1;
        min-width: 0;
      }

      .activity-list-title {
        font-size: 13px;
        font-weight: 500;
        color: var(--color-text);
      }

      .activity-list-title a {
        color: var(--color-primary);
      }

      .activity-list-title a:hover {
        text-decoration: underline;
      }

      .activity-list-meta {
        font-size: 11px;
        color: var(--color-muted);
        margin-top: 2px;
      }

      .timeline-item {
        display: flex;
        gap: 14px;
        padding: 12px 0;
        border-left: 2px solid var(--color-border);
        margin-left: 8px;
        padding-left: 16px;
        position: relative;
      }

      .timeline-item::before {
        content: "";
        position: absolute;
        left: -6px;
        top: 18px;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--color-primary);
      }

      .timeline-item-content {
        flex: 1;
      }

      .timeline-item-type {
        font-weight: 600;
        color: var(--color-text);
      }

      .timeline-item-time {
        font-size: 12px;
        color: var(--color-muted);
        margin-top: 2px;
      }

      .timeline-empty {
        padding: 24px;
        text-align: center;
        color: var(--color-muted);
        font-size: 13px;
      }

      .blockchain-empty {
        padding: 12px 0;
      }

      .blockchain-proof {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .blockchain-proof > div {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 4px;
      }

      .spinner-wrap {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      @keyframes spinner-rotate {
        to { transform: rotate(360deg); }
      }

      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 16px;
        flex-wrap: wrap;
      }

      .page-header-title {
        margin: 0;
        font-size: 24px;
        font-weight: 600;
        color: var(--color-text);
      }

      .page-header-subtitle {
        font-size: 14px;
        margin-top: 4px;
      }

      .page-header-back {
        font-size: 13px;
        color: var(--color-primary);
        display: inline-block;
        margin-bottom: 6px;
      }

      .page-header-back:hover {
        text-decoration: underline;
      }

      .notification-container {
        position: fixed;
        top: 80px;
        right: 20px;
        z-index: 100;
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-width: 360px;
      }

      .notification-container .notification {
        background: var(--color-primary) !important;
        color: #fff !important;
        padding: 12px 16px;
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-soft);
        border: 1px solid rgba(255,255,255,0.2);
      }

      .notification-container .notification[data-type="success"] {
        background: var(--color-success) !important;
      }

      .notification-container .notification[data-type="error"] {
        background: var(--color-danger) !important;
      }

      .notification-container .notification[data-type="warning"] {
        background: #d97706 !important;
      }

      .notification-container .notification[data-type="info"] {
        background: var(--color-primary) !important;
      }

      .empty-state {
        padding: 48px 24px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .empty-state-icon {
        font-size: 48px;
        opacity: 0.6;
        margin-bottom: 8px;
      }

      .empty-state-title {
        font-size: 18px;
        font-weight: 600;
        color: var(--color-text);
      }

      .certificate-page { max-width: 720px; margin: 0 auto; padding-bottom: 32px; }
      .certificate-actions { display: flex; gap: 8px; flex-wrap: wrap; }
      .certificate-container {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        padding: 32px;
        box-shadow: var(--shadow-card);
      }
      .certificate-header {
        text-align: center;
        margin-bottom: 24px;
        padding-bottom: 24px;
        border-bottom: 1px solid var(--color-border);
      }
      .certificate-logo { font-size: 24px; font-weight: 700; color: var(--color-primary); letter-spacing: 0.05em; }
      .certificate-subtitle { font-size: 12px; color: var(--color-muted); margin-top: 4px; }
      .certificate-title { font-size: 18px; color: var(--color-text); margin: 16px 0 0; font-weight: 600; }
      .certificate-status-block {
        text-align: center;
        padding: 20px;
        border-radius: var(--radius-md);
        margin-bottom: 24px;
      }
      .certificate-status-block--verified {
        background: rgba(14, 203, 129, 0.15);
        border: 1px solid rgba(14, 203, 129, 0.4);
      }
      .certificate-status-block--error {
        background: rgba(246, 70, 93, 0.12);
        border: 1px solid rgba(246, 70, 93, 0.4);
      }
      .certificate-status-icon { font-size: 32px; display: block; margin-bottom: 8px; }
      .certificate-status-block h2 { margin: 0 0 4px; font-size: 18px; }
      .certificate-sections { display: grid; gap: 20px; }
      .certificate-section h3 {
        font-size: 13px;
        color: var(--color-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin: 0 0 8px;
      }
      .certificate-section dl { margin: 0; }
      .certificate-section dt { font-size: 11px; color: var(--color-muted); margin-top: 10px; }
      .certificate-section dt:first-child { margin-top: 0; }
      .certificate-section dd { margin: 2px 0 0; font-size: 14px; }
      .certificate-hash { word-break: break-all; font-size: 12px; }
      .certificate-timeline { margin-top: 8px; }
      .certificate-footer {
        margin-top: 24px;
        padding-top: 20px;
        border-top: 1px solid var(--color-border);
        text-align: center;
        font-size: 12px;
        color: var(--color-muted);
      }

      @media print {
        .app-header,
        .app-nav,
        .page-sidebar,
        .footer,
        .btn,
        .notification-container,
        .page-header-actions,
        .page-header-back,
        .no-print {
          display: none !important;
        }
        .card {
          break-inside: avoid;
        }
      }

      @media (max-width: 768px) {
        .app-header-inner { flex-wrap: wrap; }
        .app-nav { order: 3; width: 100%; }
        .page-container { flex-direction: column; }
        .page-sidebar { display: none !important; }
        .dashboard-hero { grid-template-columns: 1fr; }
        .verify-layout { grid-template-columns: 1fr; }
        .grid[style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
        .services-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
