<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blockchain File Registry</title>
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f1f5f9; }
      a { color: inherit; }
      .container { max-width: 1100px; margin: 0 auto; padding: 16px; }
      .card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
      .grid { display: grid; gap: 16px; }
      .row { display: flex; gap: 12px; align-items: center; }
      .header { background: #0f172a; color: white; padding: 12px 16px; }
      .nav { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
      .navlinks { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
      .btn { border: 0; border-radius: 10px; padding: 10px 14px; cursor: pointer; }
      .btn-primary { background: #2563eb; color: white; }
      .btn-danger { background: #ef4444; color: white; }
      .btn-muted { background: #e2e8f0; color: #0f172a; }
      .input { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; }
      .label { font-size: 12px; color: #334155; margin-bottom: 6px; }
      .muted { color: #64748b; font-size: 13px; }
      .ok { color: #16a34a; }
      .bad { color: #dc2626; }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; border-bottom: 1px solid #e2e8f0; padding: 10px 8px; font-size: 14px; }
      code { background: #f1f5f9; padding: 2px 6px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
