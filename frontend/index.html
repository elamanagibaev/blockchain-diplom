<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediChain Records - защищённая платформа</title>
    <style>
      /* ---------- color palette ---------- */
      :root {
        --color-bg: #f1f5f9;
        --color-surface: #ffffff;
        --color-primary: #2563eb;      /* strong blue */
        --color-primary-light: #3b82f6;
        --color-accent: #14b8a6;       /* turquoise */
        --color-text: #0f172a;
        --color-muted: #64748b;
        --color-success: #16a34a;
        --color-danger: #dc2626;
        --radius: 12px;
      }

      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--color-bg);
        color: var(--color-text);
      }
      a { color: inherit; text-decoration: none; }

      .container { max-width: 1100px; margin: 0 auto; padding: 16px; }
      .card {
        background: var(--color-surface);
        border-radius: var(--radius);
        padding: 20px;
        box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      }
      .grid { display: grid; gap: 16px; }
      .row { display: flex; gap: 12px; align-items: center; }

      .header { background: var(--color-primary); color: white; padding: 12px 16px; }
      .nav { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
      .navlinks { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }

      .btn {
        border: 0;
        border-radius: var(--radius);
        padding: 10px 16px;
        cursor: pointer;
        font-weight: 500;
        transition: background 0.2s;
      }
      .btn-primary {
        background: var(--color-primary);
        color: white;
      }
      .btn-primary:hover { background: var(--color-primary-light); }
      .btn-danger { background: var(--color-danger); color: white; }
      .btn-muted {
        background: #e2e8f0;
        color: var(--color-text);
      }
      .btn-outline {
        background: transparent;
        border: 1px solid var(--color-primary);
        color: var(--color-primary);
      }

      .input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #cbd5e1;
        border-radius: var(--radius);
        font-size: 14px;
      }
      .label { font-size: 12px; color: #334155; margin-bottom: 6px; }

      .muted { color: var(--color-muted); font-size: 13px; }
      .ok { color: var(--color-success); font-weight: 600; }
      .bad { color: var(--color-danger); font-weight: 600; }

      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; border-bottom: 1px solid #e2e8f0; padding: 10px 8px; font-size: 14px; }
      tbody tr:hover { background: #f8fafc; }
      code { background: var(--color-bg); padding: 2px 6px; border-radius: 6px; font-family: monospace; }

      /* utility classes */
      .text-center { text-align: center; }
      .mb-16 { margin-bottom: 16px; }
      .mt-16 { margin-top: 16px; }
      .footer { text-align: center; font-size: 13px; padding: 16px 0; color: var(--color-muted); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
